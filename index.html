<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="./Styles/styles.css">
    <script src="./script.js" defer></script>
    <style>
        /* Add your existing styles here */

        /* Additional style for the note */
        .made-with-love {
            position: fixed;
            bottom: 10px; /* Adjust this value to move it closer to the bottom */
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #eee4e4;
        }

        .github-link {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <h1 class="header_text">You And Me, Date On Valentines?
            </h1>
        </div>
        <div class="gif_container">
            <img src="Styles\Adobe Express - file.jpg" alt="Cute animated illustration">
        </div>
        <div class="buttons">
            <button class="btn" id="yesButton" onclick="nextPage()">Yes</button>
            <button class="btn" id="noButton" onmouseover="moveButton()">No</button>
        </div>

        <!-- Positioned closer to the bottom with GitHub link -->
        <p class="made-with-love">
            Have a great time at the concert! 🎶🏟️. 
            <a href="https://www.youtube.com/watch?v=xeMOO5EudYs" class="github-link" target="_blank"> I'll be listening to this...</a>.
        </p>
    </div>
</body>
</html>
